<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Master - Editor v2.2 (Source Credit)</title>
    <style>
        :root {
            --primary: #00796B;
            --bg: #f5f7fa;
            --sidebar-bg: #ffffff;
            --border: #e0e0e0;
            --text: #2c3e50;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --info: #3498db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
        }

        /* Header */
        header {
            background: var(--primary); color: white; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10;
        }
        h1 { margin: 0; font-size: 1.2rem; display:flex; align-items:center; gap:10px; }
        .header-actions { display: flex; gap: 10px; }
        
        /* Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            flex: 0 0 35%; min-width: 350px; max-width: 500px;
            background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .sidebar-tools { padding: 10px; background: #fafafa; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .search-box input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing:border-box; }
        
        .sort-bar { display: flex; gap: 5px; }
        .sort-btn { flex: 1; padding: 4px; font-size: 0.8rem; cursor: pointer; background: white; border: 1px solid #ccc; border-radius: 4px; }
        .sort-btn:hover { background: #eee; }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .item-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .item-list li {
            padding: 12px 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid transparent; /* For active/saved state */
        }
        .item-list li:hover { background: #f5f5f5; }
        .item-list li.active { background: #E0F2F1; border-left-color: var(--primary); }
        .item-list li.error { border-left-color: var(--danger); background: #fff0f0; }
        .item-list li.saved-item { background: #E8F5E9; border-left-color: var(--success); }
.item-list li.error.active {
            background: #ffcdd2;       /* 背景改為較深的粉紅色/紅色 */
            border-left-color: #c62828; /* 邊框改為深紅色 */
        }
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-id { font-size: 0.75rem; color: #888; font-family: monospace; background: #eee; padding: 1px 4px; border-radius: 3px; display: inline-block; width: fit-content; }
        .item-name { font-weight: 500; }
        .item-sub { font-size: 0.8rem; color: #888; }

        .add-btn { padding: 15px; background: #eee; text-align: center; cursor: pointer; font-weight: bold; color: var(--primary); border-top: 1px solid var(--border); }
        .add-btn:hover { background: #e0e0e0; }

        /* Editor */
        .editor { flex: 1; padding: 30px; overflow-y: auto; background: #fff; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .img-preview {
            width: 100%; height: 200px; background: #eee; margin-top: 10px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; border: 1px dashed #ccc; overflow: hidden; position: relative;
        }
        .img-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .img-status { position: absolute; top: 5px; right: 5px; padding: 4px 10px; border-radius: 4px; font-size: 12px; color: white; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; color: white; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); color: #333; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        
        .toolbar { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
        .tag-suggestions { margin-top: 5px; display: flex; gap: 5px; flex-wrap: wrap; }
        .tag-pill { background: #e0e0e0; font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; cursor: pointer; user-select: none; }
        .tag-pill:hover { background: #d0d0d0; }

        /* Report Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal { background: white; width: 90%; max-width: 600px; border-radius: 8px; padding: 20px; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; }
        .report-list { list-style: none; padding: 0; margin-top: 10px; }
        .report-list li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header>
    <h1>🧠 Anatomy Editor <small style="font-size:0.8rem; opacity:0.8; font-weight:normal;">v2.2</small></h1>
    <div class="header-actions">
        <button class="btn btn-outline" onclick="checkDuplicates()">🔍 檢查重複</button>
        <button class="btn btn-outline" onclick="checkAllImages()">🖼️ 測試所有圖片</button>
        <div style="width:1px; height:20px; background:rgba(255,255,255,0.3); margin:0 5px;"></div>
        <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadFile(this)">
        <button class="btn btn-outline" onclick="document.getElementById('file-input').click()">📂 載入</button>
        <button class="btn btn-success" onclick="downloadJSON()">💾 下載</button>
    </div>
</header>

<div class="main-container">
<div class="sidebar">
        <div class="sidebar-tools">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 搜尋名稱或 ID..." oninput="renderList()">
            </div>
            <div class="sort-bar">
                <button class="sort-btn" onclick="sortList('id')">🔢 ID</button>
                <button class="sort-btn active" onclick="sortList('zh')">🇨🇳 中文名</button>
                <button class="sort-btn" onclick="sortList('en')">🇺🇸 英文名</button>
            </div>
            
            <div style="font-size: 0.85rem; color: #666; margin-top: 8px; padding: 0 4px; display: flex; justify-content: space-between; border-top: 1px dashed #eee; padding-top: 5px;">
                <span>總項目: <strong id="total-count" style="color:var(--primary)">0</strong></span>
                <span id="filter-hint" style="display:none;">(搜尋結果: <strong id="filter-count">0</strong>)</span>
            </div>
            </div>
        
        <ul class="item-list" id="item-list"></ul>
        <div class="add-btn" onclick="addNewItem()">+ 新增題目</div>
    </div>
    <div class="editor">
        <div id="empty-state" style="display:flex; height:100%; align-items:center; justify-content:center; color:#888; flex-direction:column;">
            <h2>歡迎使用編輯器</h2>
            <p>請從左側列表選擇題目，或點擊上方「📂 載入」讀取檔案。</p>
        </div>

        <div id="editor-form" style="display:none;">
            <div class="row">
                <div class="col form-group">
                    <label>ID (唯一代碼)</label>
                    <input type="text" id="edit-id" onchange="checkIdUnique()">
                </div>
                <div class="col form-group">
                    <label>中文名稱 (Name ZH)</label>
                    <input type="text" id="edit-name-zh" oninput="updatePreviewList()">
                </div>
                <div class="col form-group">
                    <label>英文名稱 (Name EN)</label>
                    <input type="text" id="edit-name-en">
                </div>
            </div>

            <div class="form-group">
                <label>圖片網址 (Image URL)</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="edit-img" oninput="previewImage()" style="flex:1" placeholder="貼上 Wiki 頁面連結或圖片連結...">
                    <button class="btn btn-warning" onclick="convertAndTestImage()" style="padding:0 15px;">🔄 轉換 & 測試</button>
                </div>
                <div class="img-preview" id="img-preview-box">
                    <span>圖片預覽區域</span>
                    <div id="img-status-badge" class="img-status"></div>
                </div>
            </div>

            <div class="form-group">
                <label>圖片來源 / 版權資訊 (Image Source)</label>
                <input type="text" id="edit-img-source" placeholder="例如：圖片來源：由 Anatomography 建立，透過 Wikimedia Commons 釋出..." style="font-size:0.85rem; color:#666;">
            </div>

            <div class="row">
                <div class="col form-group">
                    <label>中文描述 (Desc ZH)</label>
                    <textarea id="edit-desc"></textarea>
                </div>
                <div class="col form-group">
                    <label>英文描述 (Desc EN)</label>
                    <textarea id="edit-desc-en"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>標籤 (Tags)</label>
                <input type="text" id="edit-tags" placeholder="例如: 跑步, 下肢, 伸展">
                <div class="tag-suggestions" id="tag-suggestions"></div>
            </div>

            <div class="toolbar">
                <button class="btn btn-danger" onclick="deleteCurrent()">🗑️ 刪除</button>
                <button class="btn btn-primary" onclick="saveCurrent()">✅ 儲存修改</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="report-modal">
    <div class="modal">
        <h2 id="report-title" style="margin-top:0;">檢查報告</h2>
        <div id="report-content" style="flex:1; overflow-y:auto;"></div>
        <button class="btn btn-primary" style="margin-top:20px; align-self:flex-end;" onclick="closeModal()">關閉</button>
    </div>
</div>

<script>
    // 1. [修正] 全域變數改為 currentIndex
    let db = [];
    let currentIndex = -1; 
    let currentSort = 'zh';

    const commonTags = ["跑步", "游泳", "籃球", "下肢", "上肢", "核心", "伸展", "屈曲", "原動肌"];
    const templateItem = { id: "new_01", name_zh: "新題目", name_en: "New Item", img: "", desc: "", desc_en: "", img_source: "", tags: ["未分類"] };

    window.onload = () => {
        const saved = localStorage.getItem('anatomy_editor_cache');
        if (saved) db = JSON.parse(saved);
        else db = [JSON.parse(JSON.stringify(templateItem))];
        renderTags();
        sortList('zh');
    };

    // --- Smart Convert & Test Logic ---
    async function convertAndTestImage() {
        const input = document.getElementById('edit-img');
        const sourceInput = document.getElementById('edit-img-source');
        let url = input.value.trim();
        const badge = document.getElementById('img-status-badge');
        
        if(!url) { alert("請先輸入網址！"); return; }

        if (url.includes('commons.wikimedia.org/wiki/File:')) {
            badge.style.display = 'block';
            badge.innerText = 'Converting...';
            badge.style.background = 'var(--info)';

            try {
                const match = url.match(/File:(.+)$/);
                if (match) {
                    const fileName = decodeURIComponent(match[1]);
                    const apiUrl = `https://commons.wikimedia.org/w/api.php?action=query&titles=File:${fileName}&prop=imageinfo&iiprop=url|extmetadata&format=json&origin=*`;
                    
                    const res = await fetch(apiUrl);
                    const data = await res.json();
                    
                    let realUrl = null;
                    let metadata = null;

                    if (data.query && data.query.pages) {
                        const pages = Object.values(data.query.pages);
                        if (pages[0] && pages[0].imageinfo && pages[0].imageinfo[0]) {
                            const info = pages[0].imageinfo[0];
                            realUrl = info.url;
                            metadata = info.extmetadata;
                        }
                    }

                    if (realUrl) {
                        input.value = realUrl;
                        url = realUrl;
                        
                        if (metadata) {
                            let artist = metadata.Artist ? metadata.Artist.value.replace(/<[^>]*>?/gm, '') : 'Unknown';
                            let license = metadata.LicenseShortName ? metadata.LicenseShortName.value : 'CC';
                            sourceInput.value = `圖片來源：由 ${artist} 建立，透過 Wikimedia Commons 釋出，遵循 ${license} 授權條款。`;
                            
                            sourceInput.style.backgroundColor = "#fff3cd";
                            setTimeout(()=> sourceInput.style.backgroundColor = "white", 1000);
                        }

                        saveCurrent(); 
                        input.style.backgroundColor = "#d4edda";
                        setTimeout(()=> input.style.backgroundColor = "white", 500);
                    } else {
                        console.warn("Wiki API 找不到對應圖片，嘗試直接測試原網址。");
                    }
                }
            } catch (e) {
                console.error("轉換失敗:", e);
                alert("自動轉換失敗，將直接測試原連結。");
            }
        }

        badge.style.display = 'block';
        badge.innerText = 'Testing...';
        badge.style.background = '#7f8c8d'; 

        const img = new Image();
        img.src = url;
        img.onload = () => {
            badge.innerText = 'OK';
            badge.style.background = 'var(--success)';
            previewImage(); 
        };
        img.onerror = () => {
            badge.innerText = 'Error';
            badge.style.background = 'var(--danger)';
        };
    }

    // --- Core Functions ---

    function sortList(type) {
        currentSort = type;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        if(type==='id') document.querySelector('button[onclick="sortList(\'id\')"]').classList.add('active');
        if(type==='zh') document.querySelector('button[onclick="sortList(\'zh\')"]').classList.add('active');
        if(type==='en') document.querySelector('button[onclick="sortList(\'en\')"]').classList.add('active');
        db.sort((a, b) => {
            if (type === 'id') return a.id.localeCompare(b.id, undefined, {numeric: true});
            if (type === 'zh') return a.name_zh.localeCompare(b.name_zh, 'zh-Hant');
            if (type === 'en') return a.name_en.localeCompare(b.name_en);
        });
        renderList();
    }





function renderList() {
        const list = document.getElementById('item-list');
        const searchInput = document.getElementById('search-input'); // 取得輸入框元素
        const term = searchInput.value.toLowerCase();
        list.innerHTML = '';
        
        // 1. 先計算所有 ID 的出現次數 (用於標記重複)
        const idCounts = {};
        db.forEach(item => {
            const id = item.id ? item.id.trim() : "";
            idCounts[id] = (idCounts[id] || 0) + 1;
        });

        // 2. 準備計數器
        let visibleCount = 0; 
        
        db.forEach((item, index) => {
            // 搜尋過濾邏輯
            if (term && !item.name_zh.includes(term) && !item.name_en.toLowerCase().includes(term) && !item.id.includes(term)) {
                return; // 如果不符合搜尋條件，跳過
            }
            
            visibleCount++; // 符合條件的計數 +1

            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-info">
                    <span class="item-id">${item.id}</span>
                    <span class="item-name">${item.name_zh}</span>
                    <span class="item-sub">${item.name_en}</span>
                </div>
            `;
            
            li.onclick = () => loadItem(index);
            
            // 處理選中狀態
            if (index === currentIndex) li.classList.add('active');
            
            // 處理圖片錯誤
            if (item._hasError) li.classList.add('error');

            // 處理重複 ID
            if (item.id && idCounts[item.id] > 1) {
                li.classList.add('error');
                li.querySelector('.item-id').innerHTML += ' <span style="color:red; font-weight:bold;">(重複)</span>';
            }
            
            list.appendChild(li);
        });

        // 3. 更新介面上的數字
        document.getElementById('total-count').innerText = db.length;
        
        const filterHint = document.getElementById('filter-hint');
        if (term) {
            // 如果有搜尋文字，顯示篩選結果數量
            filterHint.style.display = 'inline';
            document.getElementById('filter-count').innerText = visibleCount;
            // 搜尋時如果沒結果，給個視覺提示
            if (visibleCount === 0) {
                list.innerHTML = `<li style="text-align:center; padding:20px; color:#aaa;">沒有找到 "${searchInput.value}"</li>`;
            }
        } else {
            // 沒有搜尋時，隱藏篩選提示
            filterHint.style.display = 'none';
        }
    }




    function loadItem(index) {
        if (index < 0 || index >= db.length) return;
        
        currentIndex = index;
        const item = db[index];
        
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('editor-form').style.display = 'block';
        
        document.getElementById('edit-id').value = item.id || '';
        document.getElementById('edit-name-zh').value = item.name_zh || '';
        document.getElementById('edit-name-en').value = item.name_en || '';
        document.getElementById('edit-img').value = item.img || '';
        document.getElementById('edit-img-source').value = item.img_source || ''; 
        document.getElementById('edit-desc').value = item.desc || '';
        document.getElementById('edit-desc-en').value = item.desc_en || '';
        document.getElementById('edit-tags').value = Array.isArray(item.tags) ? item.tags.join(', ') : (item.tags || '');
        
        previewImage();
        renderList(); 
        document.getElementById('img-status-badge').style.display = 'none';
        
        // 自動捲動到列表該項目位置
        setTimeout(() => {
            const activeLi = document.querySelector('.item-list li.active');
            if(activeLi) activeLi.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 50);
    }

    function saveCurrent() {
        if (currentIndex === -1) return;
        
        const newId = document.getElementById('edit-id').value.trim();
        // 檢查 ID 重複 (排除自己)
        const existingIndex = db.findIndex(x => x.id === newId);
        if (existingIndex !== -1 && existingIndex !== currentIndex) { 
            alert("❌ ID 與其他項目重複！請更換 ID。"); 
            return; 
        }
        
        const updated = {
            id: newId,
            name_zh: document.getElementById('edit-name-zh').value,
            name_en: document.getElementById('edit-name-en').value,
            img: document.getElementById('edit-img').value,
            img_source: document.getElementById('edit-img-source').value,
            desc: document.getElementById('edit-desc').value,
            desc_en: document.getElementById('edit-desc-en').value,
            tags: document.getElementById('edit-tags').value.split(/[,，]/).map(t => t.trim()).filter(t => t)
        };
        
        db[currentIndex] = updated;
        localStorage.setItem('anatomy_editor_cache', JSON.stringify(db));
        
        renderList();
        
        const btn = document.querySelector('.btn-primary');
        const oldText = btn.innerText;
        btn.innerText = "已儲存！"; btn.style.background = "var(--success)";
        setTimeout(() => { btn.innerText = oldText; btn.style.background = ""; }, 1000);
    }

    function addNewItem() {
        const newItem = JSON.parse(JSON.stringify(templateItem));
        newItem.id = "new_" + Date.now().toString().slice(-4);
        db.push(newItem);
        sortList(currentSort);
        
        const newIndex = db.indexOf(newItem);
        loadItem(newIndex);
    }

    function deleteCurrent() {
        if (currentIndex === -1) return;
        if (!confirm("確定要刪除這個題目嗎？")) return;
        
        db.splice(currentIndex, 1);
        
        currentIndex = -1;
        document.getElementById('editor-form').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
        
        renderList();
        localStorage.setItem('anatomy_editor_cache', JSON.stringify(db));
    }
    
    function deleteItemByIndex(index) {
        if (!confirm("確定要刪除這個重複項目嗎？")) return;
        db.splice(index, 1);
        localStorage.setItem('anatomy_editor_cache', JSON.stringify(db));
        
        // 如果刪除的是當前正在編輯的，要重置編輯區
        if(index === currentIndex) {
            currentIndex = -1;
            document.getElementById('editor-form').style.display = 'none';
            document.getElementById('empty-state').style.display = 'flex';
        } else if (index < currentIndex) {
            // 如果刪除的項目在當前項目之前，currentIndex 需要減 1 保持對應正確
            currentIndex--;
        }

        renderList();
        checkDuplicates(); // 重新檢查，更新列表
    }

    // --- Tools ---

    function checkDuplicates() {
        const idMap = {};
        const duplicates = [];
        db.forEach((item, index) => {
            if(idMap[item.id]) {
                duplicates.push({ type: 'ID 重複', val: item.id, item: item, index: index });
            } else { idMap[item.id] = true; }
        });
        
        const listHtml = duplicates.length === 0 
            ? `<p style="color:green; text-align:center; font-size:1.2rem;">✅ 完美！沒有發現重複 ID。</p>`
            : `<p style="color:#e74c3c">發現 ${duplicates.length} 筆重複資料：</p>
               <ul class="report-list">` + duplicates.map(d => 
                `<li>
                    <div style="flex:1;">
                        <span style="font-weight:bold; color:#c0392b">[${d.type}] ${d.val}</span>
                        <div style="font-size:0.85rem; color:#666;">${d.item.name_zh}</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-warning btn-outline" style="color:#333; border-color:#ccc; font-size:12px; padding:4px 8px;" onclick="loadItem(${d.index}); closeModal();">🖊️</button>
                        <button class="btn btn-danger" style="font-size:12px; padding:4px 8px;" onclick="deleteItemByIndex(${d.index})">🗑️</button>
                    </div>
                 </li>`).join('') + `</ul>`;
        showModal('重複資料檢查', listHtml);
    }

    async function checkAllImages() {
        showModal('圖片測試', '<p>檢測中... <span id="check-progress">0%</span></p>');
        const errors = [];
        let completed = 0;
        const checkPromises = db.map(item => {
            return new Promise(resolve => {
                if (!item.img) { completed++; updateProgress(completed, db.length); resolve(); return; }
                const img = new Image();
                img.src = item.img;
                img.onload = () => { item._hasError = false; completed++; updateProgress(completed, db.length); resolve(); };
                img.onerror = () => { item._hasError = true; errors.push(item); completed++; updateProgress(completed, db.length); resolve(); };
            });
        });
        await Promise.all(checkPromises);
        renderList();
        
        // [修正] 按鈕改為傳入正確的 index
        const content = errors.length === 0 
            ? `<p style="color:green; text-align:center;">✅ 所有圖片連結正常！</p>`
            : `<p style="color:#e74c3c">發現 ${errors.length} 個無效連結：</p>
               <ul class="report-list">` + errors.map(item => {
                   const idx = db.indexOf(item); // 找出正確的 index
                   return `
                   <li>
                       <div style="width:70%"><span style="font-weight:bold">${item.name_zh}</span><br><small style="color:#888; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block;">${item.img}</small></div>
                       <button class="btn btn-warning btn-outline" style="color:#333; border-color:#ccc; font-size:12px;" onclick="loadItem(${idx}); closeModal();">修復</button>
                   </li>`;
               }).join('') + `</ul>`;
        document.getElementById('report-content').innerHTML = content;
    }
    function updateProgress(curr, total) { const el = document.getElementById('check-progress'); if(el) el.innerText = Math.round((curr/total)*100) + "%"; }

    function previewImage() {
        const url = document.getElementById('edit-img').value;
        const box = document.getElementById('img-preview-box');
        const badge = document.getElementById('img-status-badge');
        if (url) {
            box.innerHTML = `<img src="${url}" onerror="this.style.display='none'; this.parentElement.innerHTML+='<span style=\\'color:red\\'> 圖片無法載入</span>'">`;
            box.appendChild(badge);
        } else {
            box.innerHTML = '<span>沒有圖片</span>';
            box.appendChild(badge);
        }
    }

    // [修正] 改用 currentIndex 判斷，而非 currentId
    function updatePreviewList() { 
        if (currentIndex === -1) return; 
        const item = db[currentIndex]; 
        if (item) item.name_zh = document.getElementById('edit-name-zh').value; 
    }
    
    function renderTags() { document.getElementById('tag-suggestions').innerHTML = commonTags.map(t => `<span class="tag-pill" onclick="addTag('${t}')">${t}</span>`).join(''); }
    function addTag(tag) {
        const input = document.getElementById('edit-tags');
        let val = input.value.trim();
        if (val && !val.endsWith(',')) val += ', ';
        input.value = val + tag;
        saveCurrent();
    }

    function loadFile(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const json = JSON.parse(e.target.result);
                if (Array.isArray(json)) { 
                    db = json; 
                    currentIndex = -1; // 重置
                    document.getElementById('editor-form').style.display = 'none'; 
                    document.getElementById('empty-state').style.display = 'flex'; 
                    sortList('zh'); 
                    alert(`✅ 載入 ${db.length} 筆資料！`); 
                } 
                else alert("JSON 格式錯誤");
            } catch (err) { alert("讀取失敗：" + err.message); }
        };
        reader.readAsText(file); input.value = '';
    }

    function downloadJSON() {
        saveCurrent();
        const cleanDb = db.map(({ _hasError, ...rest }) => rest);
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cleanDb, null, 2));
        const anchor = document.createElement('a');
        anchor.setAttribute("href", dataStr); anchor.setAttribute("download", "anatomy_data.json");
        document.body.appendChild(anchor); anchor.click(); anchor.remove();
    }
    function showModal(title, content) {
        document.getElementById('report-title').innerText = title;
        document.getElementById('report-content').innerHTML = content;
        document.getElementById('report-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('report-modal').style.display = 'none'; }
</script></body>
</html>
