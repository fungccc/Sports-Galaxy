<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Sports Planet - Anatomy Master</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            background-image: radial-gradient(ellipse at center,  #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 強制容器滿版，避免 3D 內容看不見 */
        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 3D 卡片樣式 */
        .element {
            width: 140px;
            height: 180px;
            box-shadow: 0px 0px 12px rgba(0,255,255,0.5);
            border: 1px solid rgba(127,255,255,0.25);
            background-color: rgba(0,127,127,0.3);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            user-select: none; /* 防止文字被選取 */
        }

        .element:hover {
            box-shadow: 0px 0px 20px rgba(0,255,255,0.8);
            border: 1px solid rgba(127,255,255,0.75);
            background-color: rgba(0,127,127,0.6);
            transform: scale(1.1);
            z-index: 100;
        }

        .element .icon {
            font-size: 60px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .element .number {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: rgba(127,255,255,0.75);
        }

        .element .symbol {
            font-size: 24px;
            font-weight: bold;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 10px rgba(0,255,255,0.95);
        }

        .element .details {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            font-size: 12px;
            color: rgba(127,255,255,0.75);
        }

        /* 介面層級設定 */
        #menu {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10; /* 比 container 高 */
            pointer-events: none;
        }
        h1 {
            font-weight: 200;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 0 15px #00ffff;
        }
        p { color: rgba(127,255,255,0.5); margin-top: 5px; }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(127,255,255,0.4);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>SPORTS GALAXY</h1>
        <p>Select your training mode</p>
    </div>

    <div id="container"></div>

    <div id="controls-hint">
        🖱️ 拖曳旋轉 • 滾輪縮放 • 點擊選擇
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        // 修正 2: TWEEN 的路徑與引入方式修正 (移除 .min 並使用 default import)
        import TWEEN from 'three/addons/libs/tween.module.js';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

const sportsList = [
    { id: "Running", icon: "🏃", name: "Run", detail: "Running" },
    { id: "Basketball", icon: "🏀", name: "Bball", detail: "Basketball" },
    { id: "Football", icon: "⚽", name: "Fball", detail: "Football" },
    { id: "Badminton", icon: "🏸", name: "Badm", detail: "Badminton" },
    { id: "Hiking", icon: "🥾", name: "Hike", detail: "Hiking" },
    { id: "Combat", icon: "🥋", name: "MMA", detail: "Combat" },
    { id: "Boxing", icon: "🥊", name: "Box", detail: "Boxing" },
    { id: "Gym", icon: "🏋️", name: "Gym", detail: "Weight Training" },
    { id: "Hiit", icon: "🔥", name: "HIIT", detail: "CrossFit" },
    { id: "Cycling", icon: "🚴", name: "Bike", detail: "Cycling" },
    { id: "Tennis", icon: "🎾", name: "Ten", detail: "Tennis" },
    { id: "Climbing", icon: "🧗", name: "Climb", detail: "Bouldering" },
    { id: "Swimming", icon: "🏊", name: "Swim", detail: "Swimming" },
    { id: "Yoga", icon: "🧘", name: "Yoga", detail: "Mindfulness" },
    { id: "Pilates", icon: "🤸", name: "Pila", detail: "Pilates" },
    { id: "Baseball", icon: "⚾", name: "Base", detail: "Baseball" },
    { id: "Surfing", icon: "🏄", name: "Surf", detail: "Surfing" }
];
        let camera, scene, renderer;
        let controls;
        const objects = [];
        const targets = { sphere: [] };

        init();
        animate();

function init() {
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 2800; // 攝影機距離

            scene = new THREE.Scene();

            // --- 修改處開始：設定總張數為 138 張 (讓球體變密) ---
            const totalObjects = 128; 

            for (let i = 0; i < totalObjects; i++) {
                // 使用 % (取餘數) 來循環讀取 sportsList 的 16 筆資料
                const item = sportsList[i % sportsList.length];

                const element = document.createElement('div');
                element.className = 'element';
                // 讓顏色稍微有點隨機變化，才不會看起來完全一樣
                element.style.backgroundColor = 'rgba(0,127,127,' + (Math.random() * 0.5 + 0.25) + ')';

                const number = document.createElement('div');
                number.className = 'number';
                number.textContent = (i + 1);
                element.appendChild(number);

                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.textContent = item.icon;
                element.appendChild(icon);

                const symbol = document.createElement('div');
                symbol.className = 'symbol';
                symbol.textContent = item.name;
                element.appendChild(symbol);

                const details = document.createElement('div');
                details.className = 'details';
                details.textContent = item.detail; // 或是顯示 `Mode ${i+1}`
                element.appendChild(details);

//                // 點擊事件
//                element.addEventListener('pointerdown', () => {
//                    window.location.href = `atlas.html?sport=${item.id}`;
//                });
// 點擊事件 (修正手機端滑動與點擊衝突)
let startX = 0;
let startY = 0;

element.addEventListener('pointerdown', (e) => {
    startX = e.clientX;
    startY = e.clientY;
});

element.addEventListener('pointerup', (e) => {
    const diffX = Math.abs(e.clientX - startX);
    const diffY = Math.abs(e.clientY - startY);
    
    // 如果手指移動距離小於 5 像素，才判定為「點擊」跳轉
    if (diffX < 5 && diffY < 5) {
        window.location.href = `atlas.html?sport=${item.id}`;
    }
});

                const objectCSS = new CSS3DObject(element);
                scene.add(objectCSS);
                objects.push(objectCSS);
            }
            // --- 計算球體位置 ---
            const vector = new THREE.Vector3();
            const l = objects.length;

            for (let i = 0; i < l; i++) {
                const phi = Math.acos(-1 + (2 * i) / l);
                const theta = Math.sqrt(l * Math.PI) * phi;
                const object = new THREE.Object3D();
                object.position.setFromSphericalCoords(600, phi, theta);
                vector.copy(object.position).multiplyScalar(2);
                object.lookAt(vector);
                targets.sphere.push(object);
            }

            // --- 渲染器 ---
            renderer = new CSS3DRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // --- 控制器 ---
            controls = new TrackballControls(camera, renderer.domElement);
            controls.minDistance = 500;
            controls.maxDistance = 4000;
            controls.rotateSpeed = 2.0;

            transform(targets.sphere, 2000);

            window.addEventListener('resize', onWindowResize);
        }

        function transform(targets, duration) {
            TWEEN.removeAll();

            for (let i = 0; i < objects.length; i++) {
                const object = objects[i];
                const target = targets[i];

                object.position.x = Math.random() * 4000 - 2000;
                object.position.y = Math.random() * 4000 - 2000;
                object.position.z = Math.random() * 4000 - 2000;

                new TWEEN.Tween(object.position)
                    .to({ x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();

                new TWEEN.Tween(object.rotation)
                    .to({ x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();
            }

            new TWEEN.Tween(this)
                .to({}, duration * 2)
                .onUpdate(render)
                .start();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
            scene.rotation.y += 0.001; 
            render();
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
